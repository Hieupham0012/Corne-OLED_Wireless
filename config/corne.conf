# ===== BLUETOOTH OPTIMIZATION =====
# BLE TX power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Experimental BLE connection optimization
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Reduce BLE connection latency
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Increase Bluetooth buffer count
CONFIG_BT_BUF_EVT_RX_COUNT=16
CONFIG_BT_BUF_EVT_DISCARDABLE_COUNT=8

# Improve BLE connection stability
CONFIG_BT_BUF_ACL_RX_SIZE=512
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Fix battery reporting on Windows
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Don't clear bonds on startup
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# ===== DEBOUNCE SETTINGS =====
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# ===== DISPLAY CONFIGURATION =====
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# ===== MOUSE EMULATION =====
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# ===== POWER MANAGEMENT =====
# Idle timeout before power saving (5 minutes)
CONFIG_ZMK_IDLE_TIMEOUT=300000

# Deep sleep after 5 minutes of inactivity
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Wake-up configuration
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_USB=y

# ===== ZMK STUDIO =====
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# ===== RGB UNDERGLOW =====
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=30
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# ===== LOGGING =====
CONFIG_ZMK_USB_LOGGING=n
